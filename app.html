<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>마음기록 — 무엇이든 이야기해 보세요</title>
<style>
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
  :root{
    --bg:#ffffff; --side:#f7f7f8; --panel:#ffffff; --line:#e6e7eb;
    --text:#1f2328; --sub:#6b7280; --muted:#9aa1ab;
    --me:#1d9e75; --ai:#f2f3f5; --accent:#1d9e75; --danger:#e2504a;
    --shadow:0 8px 30px rgba(0,0,0,.12);
    --hdr:54px; --maxw:780px; --drawer-w:300px;
  }
  html,body{ height:100%; }
  body{ font-family:"Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif; background:var(--bg); color:var(--text); overflow:hidden; }

  /* ===== 헤더 ===== */
  .hdr{ position:fixed; top:0; left:0; right:0; height:var(--hdr); display:flex; align-items:center; justify-content:space-between;
        padding:0 10px; background:var(--bg); border-bottom:1px solid var(--line); z-index:30; transition:left .22s ease; }
  .hdr .side-l, .hdr .side-r{ display:flex; align-items:center; gap:2px; }
  .iconbtn{ width:38px; height:38px; border:none; background:none; border-radius:9px; cursor:pointer; color:var(--text);
            display:flex; align-items:center; justify-content:center; font-size:19px; }
  .iconbtn:hover{ background:#0000000a; }
  .hdr .title{ font-size:15.5px; font-weight:600; letter-spacing:-.2px; }
  .avatar{ width:30px; height:30px; border-radius:50%; background:linear-gradient(135deg,#1d9e75,#3a82f7); color:#fff;
           font-size:13px; font-weight:600; display:flex; align-items:center; justify-content:center; cursor:pointer; border:none; }

  /* ===== 채팅 영역 ===== */
  .main{ position:absolute; top:var(--hdr); bottom:0; left:0; right:0; display:flex; flex-direction:column; transition:left .22s ease; }
  .chat{ flex:1; overflow-y:auto; padding:18px 0 8px; }
  .chat-inner{ max-width:var(--maxw); margin:0 auto; padding:0 16px; display:flex; flex-direction:column; gap:14px; }
  .row{ display:flex; gap:10px; align-items:flex-start; }
  .row.me{ justify-content:flex-end; }
  .bubble{ max-width:86%; padding:11px 14px; border-radius:16px; font-size:15px; line-height:1.6; word-break:break-word; white-space:pre-wrap; }
  .row.ai .bubble{ background:var(--ai); border-bottom-left-radius:5px; }
  .row.me .bubble{ background:var(--me); color:#fff; border-bottom-right-radius:5px; }
  .row .ava{ width:28px; height:28px; border-radius:50%; flex:none; background:linear-gradient(135deg,#1d9e75,#3a82f7);
             color:#fff; font-size:13px; display:flex; align-items:center; justify-content:center; margin-top:1px; }
  .notice{ max-width:var(--maxw); margin:2px auto 4px; padding:0 16px; }
  .notice .card{ background:#f0f7f4; border:1px solid #cfe7dd; border-radius:14px; padding:12px 14px; font-size:13px; line-height:1.6; color:#2f5d4e; }
  .typing{ font-size:13px; color:var(--muted); }
  .typing span{ animation:blink 1.2s infinite; }
  .typing span:nth-child(2){ animation-delay:.2s; } .typing span:nth-child(3){ animation-delay:.4s; }
  @keyframes blink{ 0%,60%,100%{opacity:.2;} 30%{opacity:1;} }

  /* ===== 입력창 ===== */
  .composer{ border-top:1px solid var(--line); background:var(--bg); padding:10px 0 14px; }
  .composer-inner{ max-width:var(--maxw); margin:0 auto; padding:0 16px; display:flex; align-items:flex-end; gap:8px; }
  .composer .field{ flex:1; display:flex; align-items:flex-end; background:var(--side); border:1px solid var(--line);
                    border-radius:22px; padding:6px 6px 6px 16px; }
  .composer textarea{ flex:1; border:none; background:none; resize:none; outline:none; font-size:15px; line-height:1.5;
                      color:var(--text); max-height:140px; padding:6px 0; font-family:inherit; }
  .send{ width:38px; height:38px; border:none; border-radius:50%; background:var(--accent); color:#fff; font-size:17px;
         cursor:pointer; flex:none; display:flex; align-items:center; justify-content:center; }
  .send:disabled{ background:#c7cdd4; cursor:default; }
  .hint{ text-align:center; font-size:11px; color:var(--muted); margin-top:8px; padding:0 16px; }

  /* ===== 오버레이 ===== */
  .scrim{ position:fixed; inset:0; background:rgba(0,0,0,.32); opacity:0; pointer-events:none; transition:opacity .2s; z-index:40; }
  .scrim.on{ opacity:1; pointer-events:auto; }

  /* ===== 사이드 메뉴(드로어) ===== */
  .drawer{ position:fixed; top:0; bottom:0; left:0; width:300px; max-width:84vw; background:var(--side);
           border-right:1px solid var(--line); z-index:50; transform:translateX(-100%); transition:transform .22s ease;
           display:flex; flex-direction:column; }
  .drawer.on{ transform:translateX(0); }
  .drawer .d-top{ padding:12px 12px 8px; }
  .d-search{ width:100%; background:#fff; border:1px solid var(--line); border-radius:10px; padding:9px 12px; font-size:13.5px;
             color:var(--text); outline:none; }
  .d-item{ display:flex; align-items:center; gap:11px; padding:10px 12px; margin:1px 8px; border-radius:10px; cursor:pointer;
           font-size:14px; color:var(--text); }
  .d-item:hover{ background:#00000008; }
  .d-item .ic{ width:20px; text-align:center; font-size:15px; color:var(--sub); }
  .d-sep{ height:1px; background:var(--line); margin:8px 12px; }
  .d-label{ font-size:11.5px; color:var(--muted); padding:6px 20px 4px; letter-spacing:.3px; }
  .d-list{ flex:1; overflow-y:auto; padding-bottom:10px; }
  .conv{ display:block; padding:9px 20px; margin:0 8px; border-radius:9px; font-size:13.5px; color:var(--text);
         cursor:pointer; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .conv:hover{ background:#00000008; }

  /* ===== 계정 메뉴(팝오버) ===== */
  .acct{ position:fixed; top:calc(var(--hdr) + 6px); right:10px; width:240px; background:var(--panel); border:1px solid var(--line);
         border-radius:14px; box-shadow:var(--shadow); z-index:50; padding:8px; transform-origin:top right;
         opacity:0; transform:scale(.96); pointer-events:none; transition:opacity .15s, transform .15s; }
  .acct.on{ opacity:1; transform:scale(1); pointer-events:auto; }
  .acct .head{ display:flex; align-items:center; gap:10px; padding:8px 8px 10px; border-bottom:1px solid var(--line); margin-bottom:6px; }
  .acct .head .nm{ font-size:13.5px; font-weight:600; } .acct .head .em{ font-size:11.5px; color:var(--muted); }
  .a-item{ display:flex; align-items:center; gap:10px; padding:10px 10px; border-radius:9px; cursor:pointer; font-size:14px; }
  .a-item:hover{ background:#00000008; }
  .a-item .ic{ width:18px; text-align:center; color:var(--sub); }

  /* 토스트 */
  .toast{ position:fixed; left:50%; bottom:90px; transform:translateX(-50%) translateY(20px); background:#1f2328; color:#fff;
          padding:10px 16px; border-radius:10px; font-size:13px; opacity:0; pointer-events:none; transition:all .2s; z-index:60; max-width:88vw; text-align:center; }
  .toast.on{ opacity:1; transform:translateX(-50%) translateY(0); }

  /* 데스크탑(넓은 화면): 사이드바를 고정 노출하고 콘텐츠를 옆으로 민다(GPT 스타일).
     햄버거는 접기/펼치기 토글. 좁아지면 자동으로 위의 오버레이 드로어로 전환. */
  @media(min-width:900px){
    .drawer{ transform:translateX(0); }
    .hdr{ left:var(--drawer-w); }
    .main{ left:var(--drawer-w); }
    .scrim{ display:none; }                       /* 고정 모드에선 딤 불필요 */
    body.nav-collapsed .drawer{ transform:translateX(-100%); }
    body.nav-collapsed .hdr{ left:0; }
    body.nav-collapsed .main{ left:0; }
  }
</style>
</head>
<body>

<!-- 헤더 -->
<header class="hdr">
  <div class="side-l">
    <button class="iconbtn" onclick="toggleDrawer()" aria-label="메뉴">☰</button>
  </div>
  <div class="title">마음기록</div>
  <div class="side-r">
    <button class="iconbtn" onclick="toast('검색은 다음 단계에서 연결됩니다')" aria-label="검색">🔍</button>
    <button class="avatar" onclick="toggleAcct()" aria-label="계정">나</button>
  </div>
</header>

<!-- 메인 채팅 -->
<div class="main">
  <div class="chat" id="chat">
    <div class="notice" id="onboarding">
      <div class="card">안녕하세요! 저는 AI예요(의사·치료사가 아니에요). 편하게 일상 얘기하듯 쓰면, 진료에 도움되도록 정리해 선생님께만 전해드려요. 무엇을 전할지는 직접 고를 수 있어요. 단, 위험한 상황이 감지되면 안전을 위해 선생님께 알림이 갈 수 있어요.</div>
    </div>
    <div class="chat-inner" id="chatInner"></div>
  </div>

  <div class="composer">
    <div class="composer-inner">
      <div class="field">
        <textarea id="msgInput" rows="1" placeholder="무엇이든 이야기해 보세요" oninput="autoGrow(this);toggleSend()" onkeydown="onKey(event)"></textarea>
      </div>
      <button class="send" id="sendBtn" onclick="sendMsg()" disabled aria-label="전송">↑</button>
    </div>
    <div class="hint">마음기록은 진단·치료 도구가 아니라 대화를 정리해 전달하는 도구예요. (데모 — 가상 데이터)</div>
  </div>
</div>

<!-- 사이드 메뉴 -->
<aside class="drawer" id="drawer">
  <div class="d-top">
    <input class="d-search" placeholder="검색" onclick="toast('검색은 다음 단계에서 연결됩니다')" readonly>
  </div>
  <div class="d-item" onclick="newChat()"><span class="ic">＋</span> 새 대화</div>
  <div class="d-sep"></div>
  <div class="d-item" onclick="comingSoon('프로젝트')"><span class="ic">📁</span> 프로젝트</div>
  <div class="d-item" onclick="comingSoon('앱')"><span class="ic">▦</span> 앱</div>
  <div class="d-item" onclick="comingSoon('라이브러리')"><span class="ic">📚</span> 라이브러리</div>
  <div class="d-item" onclick="comingSoon('이미지')"><span class="ic">🖼</span> 이미지</div>
  <div class="d-sep"></div>
  <div class="d-label">대화 기록</div>
  <div class="d-list" id="convList"></div>
</aside>

<!-- 계정 메뉴 -->
<div class="acct" id="acct">
  <div class="head">
    <span class="avatar" style="cursor:default">나</span>
    <div><div class="nm">홍길동 (데모)</div><div class="em">가상 환자 계정</div></div>
  </div>
  <div class="a-item" onclick="comingSoon('리포트 기록 보기')"><span class="ic">🗂</span> 리포트 기록 보기</div>
  <div class="a-item" onclick="comingSoon('내보내기')"><span class="ic">⬇</span> 내보내기</div>
  <div class="a-item" onclick="comingSoon('설정')"><span class="ic">⚙</span> 설정</div>
</div>

<!-- 공용 오버레이 / 토스트 -->
<div class="scrim" id="scrim" onclick="closeAll()"></div>
<div class="toast" id="toast"></div>

<script>
/* =========================================================================
   app.html — 챗봇형 환자 앱 v2 (작업 순서 1~2번: 시작점 + 챗봇 UI 골격)
   - index.html은 건드리지 않음. 재사용 로직만 가져옴.
   - 이번 단계 범위: ① 메인 채팅 ② 사이드 메뉴 ③ 계정 메뉴 (골격)
   - 다음 단계: /chat 실연결(3) · 백그라운드 추출(4) · 위기 카드(5) · 리포트(6) · 설정(7)
   ========================================================================= */

/* ===== 재사용: index.html에서 가져온 안전·추출 로직 (변경 없음) ===== */
const RISK_WORDS = ["죽고 싶","죽고싶","다 끝내","끝내고 싶","사라지고 싶","자해"];

/* BACKEND_URL 비면 목업 모드. 채우면 Solar(Render 프록시) 사용. 키는 프론트에 절대 안 둠. */
const BACKEND_URL = "https://mindhub-mvp.onrender.com"; // 비우면 목업 모드. 채우면 Solar(Render 프록시) 사용.

/* 규칙 기반 임상 신호 추출(목업). 위험 감지는 항상 규칙 기반. */
function extractSignals(text){
  const sig = { sleep_h:null, med_taken:null, mood:null, stressor:null, red_flag:false, evidence:null };
  for(const kw of RISK_WORDS){ if(text.includes(kw)){ sig.red_flag=true; sig.evidence=text; } }
  const m = text.match(/(\d+)\s*시간/);
  if(m) sig.sleep_h = parseFloat(m[1]);
  else if(/새벽|밤새|못\s*자|잠\s*안|안\s*와/.test(text)) sig.sleep_h = 3.0;
  else if(/푹\s*자|잘\s*잤/.test(text)) sig.sleep_h = 7.0;
  if(/약.*(먹었|챙겼|복용)/.test(text)) sig.med_taken = true;
  else if(/약.*(안\s*먹|안\s*챙|걸렀|빼먹)/.test(text)) sig.med_taken = false;
  if(sig.red_flag) sig.mood = 1;
  else if(/힘들|우울|무기력|지쳐|괴로/.test(text)) sig.mood = 3;
  else if(/괜찮|좋|행복|나아/.test(text)) sig.mood = 6;
  if(/아빠|엄마|가족|부모/.test(text)) sig.stressor = "가족 갈등";
  else if(/직장|상사|회사/.test(text)) sig.stressor = "직장 스트레스";
  else if(/학교|친구/.test(text)) sig.stressor = "대인관계";
  return sig;
}

/* 백엔드 있으면 Solar로 추출, 5초 타임아웃·실패 시 목업 폴백. 위험 감지는 규칙 기반 유지.
   (이번 단계에선 보관만 — 백그라운드 추출 연결은 작업순서 4번에서.) */
async function getSignals(text){
  const mock = extractSignals(text);
  if(!BACKEND_URL) return mock;
  const ctrl = new AbortController();
  const timer = setTimeout(()=>ctrl.abort(), 5000);
  try{
    const r = await fetch(BACKEND_URL + "/extract", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ text }), signal: ctrl.signal
    });
    if(!r.ok) throw new Error("backend");
    const s = await r.json();
    return {
      ...mock, // red_flag·evidence는 규칙 기반 유지
      sleep_h:   s.sleep_h   ?? mock.sleep_h,
      med_taken: s.med_taken ?? mock.med_taken,
      mood:      mock.red_flag ? 1 : (s.mood ?? mock.mood),
      stressor:  s.stressor  ?? mock.stressor
    };
  }catch(e){ return mock; }
  finally{ clearTimeout(timer); }
}

/* ===== 채팅 UI ===== */
let logs = [];

function escapeHtml(s){ return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

function addRow(who, html, opts){
  const inner = document.getElementById('chatInner');
  const row = document.createElement('div');
  row.className = 'row ' + who;
  if(opts && opts.id) row.id = opts.id;
  row.innerHTML = (who==='ai' ? '<div class="ava">AI</div>' : '') + '<div class="bubble">'+html+'</div>';
  inner.appendChild(row);
  scrollBottom();
  return row;
}
function scrollBottom(){ const c=document.getElementById('chat'); c.scrollTop=c.scrollHeight; }

/* 폴백 답변: BACKEND_URL 비었거나 /chat 실패·타임아웃 시(예: Render cold start). 데모가 안 깨지게.
   진단·치료 발화 금지, 따뜻한 중립 응답만. */
function mockReply(){
  const opts = [
    "얘기해줘서 고마워요. 지금 잠깐 연결이 느릴 수 있는데, 그래도 듣고 있어요. 조금 더 들려줄래요?",
    "그랬군요. 오늘 하루는 어땠어요?",
    "들어주고 있어요. 편하게 더 말해줘도 돼요."
  ];
  return opts[logs.length % opts.length];
}

/* /chat 백엔드(Solar)로 범용 답변. 5초 타임아웃·실패 시 mockReply 폴백(데모 안 깨짐). */
async function chatReply(){
  if(!BACKEND_URL) return mockReply();
  const ctrl = new AbortController();
  const timer = setTimeout(()=>ctrl.abort(), 5000);
  try{
    // logs의 'ai' → 'assistant'로 변환해 최근 대화를 그대로 전달.
    const messages = logs.map(m => ({ role: m.role==='ai' ? 'assistant' : 'user', content: m.text }));
    const r = await fetch(BACKEND_URL + "/chat", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ messages }), signal: ctrl.signal
    });
    if(!r.ok) throw new Error("backend");
    const data = await r.json();
    const reply = (data && data.reply || "").trim();
    return reply || mockReply();
  }catch(e){ return mockReply(); }
  finally{ clearTimeout(timer); }
}

async function sendMsg(){
  const inp = document.getElementById('msgInput');
  const text = inp.value.trim();
  if(!text) return;
  inp.value=''; autoGrow(inp); toggleSend();
  hideOnboarding();

  addRow('me', escapeHtml(text));
  logs.push({ role:'user', text });

  // 타이핑 표시
  addRow('ai', '<span class="typing"><span>●</span><span>●</span><span>●</span></span>', {id:'typing'});

  // (작업순서 4에서 연결) 백그라운드 추출은 사용자에게 안 보이게 — 지금은 호출 안 함.
  // const sig = await getSignals(text);

  const reply = await chatReply();
  const node = document.getElementById('typing');
  if(node){ node.querySelector('.bubble').innerHTML = escapeHtml(reply); node.removeAttribute('id'); }
  logs.push({ role:'ai', text:reply });
  scrollBottom();
}

function onKey(e){
  // 한글 등 IME 조합 중 Enter는 '조합 확정'이므로 전송하지 않는다(이중 전송 방지).
  if(e.isComposing || e.keyCode===229) return;
  if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); sendMsg(); }
}
function autoGrow(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,140)+'px'; }
function toggleSend(){ const i=document.getElementById('msgInput'); document.getElementById('sendBtn').disabled = !i.value.trim(); }
function hideOnboarding(){ const o=document.getElementById('onboarding'); if(o) o.style.display='none'; }

/* ===== 사이드 / 계정 메뉴 ===== */
function scrim(on){ document.getElementById('scrim').classList.toggle('on', on); }
function toggleDrawer(){
  document.getElementById('acct').classList.remove('on');
  if(window.matchMedia('(min-width:900px)').matches){
    document.body.classList.toggle('nav-collapsed');   // 데스크탑: 접기/펼치기
  }else{
    const open = !document.getElementById('drawer').classList.contains('on');
    document.getElementById('drawer').classList.toggle('on', open);  // 모바일: 오버레이
    scrim(open);
  }
}
function toggleAcct(){
  const a=document.getElementById('acct'); const willOpen=!a.classList.contains('on');
  a.classList.toggle('on', willOpen); document.getElementById('drawer').classList.remove('on'); scrim(willOpen);
}
function closeAll(){ document.getElementById('drawer').classList.remove('on'); document.getElementById('acct').classList.remove('on'); scrim(false); }

function newChat(){
  logs=[]; document.getElementById('chatInner').innerHTML='';
  const o=document.getElementById('onboarding'); if(o) o.style.display='';
  closeAll(); toast('새 대화를 시작했어요');
}

/* 대화 기록(겉모양) — 클릭 시 이어가기는 다음 단계 */
const SAMPLE_CONVS = ["요즘 잠을 잘 못 자요","약 챙겨 먹는 게 자꾸 까먹어요","주말에 가족이랑 있었던 일","오늘은 좀 괜찮았던 하루"];
function renderConvs(){
  document.getElementById('convList').innerHTML = SAMPLE_CONVS
    .map(c=>`<div class="conv" onclick="comingSoon('대화 이어가기')">${escapeHtml(c)}</div>`).join('');
}

/* 토스트 / 자리표시자 */
let toastTimer=null;
function toast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('on');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('on'), 1900);
}
function comingSoon(name){ closeAll(); toast(name + ' — 다음 단계에서 구현됩니다'); }

/* ===== 초기화 ===== */
renderConvs();
toggleSend();
</script>
